name: bpref
channels:
  - pytorch
  - nvidia
  - defaults
dependencies:
  - python=3.8
  - pytorch=2.4.1
  - pytorch-cuda=12.4
  - intel-openmp=2023.1.0
  - mkl=2023.1.0
  - absl-py
  - pyparsing
  - pip
  - pip:
    - termcolor
    - mujoco
    - dm-control
    - wandb
    - tb-nightly
    - imageio
    - imageio-ffmpeg
    - git+https://github.com/facebookresearch/hydra@0.11_branch
    - matplotlib
    - glfw==1.11.2
    - scikit-image

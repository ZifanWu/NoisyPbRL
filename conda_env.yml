name: bpref
channels:
  - pytorch
  - nvidia
  - defaults
dependencies:
  - python=3.8
  - pytorch=2.4.1
  - pytorch-cuda=12.4
  - intel-openmp=2023.1.0
  - mkl=2023.1.0
  - absl-py
  - pyparsing
  - pip
  - pip:
    - termcolor==2.4.0
    - mujoco==3.2.3
    - mujoco-py==2.1.2.14
    - dm-control==1.0.23
    - wandb==0.24.2
    - tensorboard==2.14.0
    - imageio==2.35.1
    - imageio-ffmpeg==0.5.1
    # hydra 0.11.3 is only available via git
    - git+https://github.com/facebookresearch/hydra@0.11_branch
    - matplotlib==3.7.5
    - glfw==1.11.2
    - scikit-image==0.21.0
    - scipy==1.10.1
    - gym==0.26.2
    - numpy==1.24.4

# MetaWorld must be installed separately (no PyPI release):
#   Download the Metaworld-2.0.0 archive and run:
#   pip install -e /path/to/Metaworld-2.0.0
#
# This repo (NoisyPbRL) is also installed in editable mode:
#   pip install -e .
#
# gym 0.26 uses the new 5-value step API (terminated, truncated, info).
# MetaWorld uses the old 4-value API, so utils.py wraps it with
# gym.wrappers.StepAPICompatibility before passing to TimeLimit.
